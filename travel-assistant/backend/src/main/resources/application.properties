# ═══════════════════════════════════════════════════════
# Tripx Travel Assistant — application.properties
# Switch between MySQL (production) and H2 (dev) here
# ═══════════════════════════════════════════════════════

server.port=8080
server.address=0.0.0.0
spring.application.name=tripx-travel

# ── MySQL (PRODUCTION) ──────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/tripx_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=tripx_user
spring.datasource.password=Mphasis@123

# ── H2 (DEVELOPMENT — works without MySQL install) ──────
# spring.datasource.url=jdbc:h2:file:./data/tripx_db;AUTO_SERVER=TRUE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=tripx123
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ── JPA ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ── JWT ────────────────────────────────────────────────
jwt.secret=TripxSuperSecureAdminJWTKey2024@#$XYZabcdefghijklmnopqrstuvwxyz123456
jwt.expiration=86400000
jwt.admin.expiration=28800000

# ── CORS ───────────────────────────────────────────────
cors.allowed-origins=*

# ── File Upload ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ────────────────────────────────────────────
logging.level.com.travel=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Admin default credentials (change in production!) ──
admin.default.email=admin@tripx.com
admin.default.password=Admin@123
